
<h2 class="sr-only">DIGILOG complete database schema — entity relationship diagram across 6 domains</h2>
<style>
.domain-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.dtab { padding:6px 14px; border-radius:20px; font-size:13px; cursor:pointer; border:1px solid var(--color-border-primary); color:var(--color-text-secondary); background:var(--color-background-secondary); transition:all .15s; }
.dtab.active { color:#534AB7; border-color:#534AB7; background:#EEEDFE; font-weight:500; }
.domain-label { font-size:11px; font-weight:500; letter-spacing:.04em; text-transform:uppercase; color:var(--color-text-tertiary); margin:0 0 6px; }
#erd-container { min-height:420px; }
#erd-container svg { max-width:100%; height:auto; }
</style>

<div class="domain-tabs">
  <button class="dtab active" onclick="showDomain('all')">All tables</button>
  <button class="dtab" onclick="showDomain('auth')">Auth & tenants</button>
  <button class="dtab" onclick="showDomain('master')">Master config</button>
  <button class="dtab" onclick="showDomain('users')">Users & employees</button>
  <button class="dtab" onclick="showDomain('sop')">SOPs & forms</button>
  <button class="dtab" onclick="showDomain('equipment')">Equipment</button>
  <button class="dtab" onclick="showDomain('batch')">Batch & logs</button>
</div>
<div id="erd-container"></div>

<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CECBF6' : '#26215C',
    primaryBorderColor: dark ? '#534AB7' : '#7F77DD',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    secondaryTextColor: dark ? '#9FE1CB' : '#04342C',
    tertiaryColor: dark ? '#444441' : '#F1EFE8',
    tertiaryTextColor: dark ? '#D3D1C7' : '#2C2C2A',
  },
  er: { diagramPadding: 20, layoutDirection: 'TB', minEntityWidth: 100, minEntityHeight: 75, entityPadding: 15 }

const diagrams = {

    string contact_email

  }

    uuid id PK

    string username
    string email
    string password_hash
    boolean is_super_admin
    boolean is_active
    boolean must_change_pwd
    timestamp last_login_at
  }
  refresh_tokens {
    uuid id PK
    uuid user_id FK
    string token_hash UK
    timestamp expires_at
    boolean revoked
    timestamp created_at
  }
  login_audit {
    bigint id PK
    uuid company_id FK
    uuid user_id FK
    string username_attempted
    string event_type
    inet ip_address
    text user_agent
    timestamp created_at
  }
  login_attempts {
    bigint id PK
    string identifier
    uuid company_id FK
    int attempt_count
    timestamp locked_until
    timestamp last_attempt

  companies ||--o{ central_users : "has users"
  companies ||--o{ login_audit : "tracks"
  companies ||--o{ login_attempts : "rate limits"

async function render(key) {
  const container = document.getElementById('erd-container');
  container.innerHTML = '<p style="color:var(--color-text-tertiary);font-size:13px;padding:20px 0">Rendering…</p>';
  try {
    const id = 'erd-' + Date.now();
    const { svg } = await mermaid.render(id, diagrams[key]);
    container.innerHTML = svg;
    container.querySelectorAll('svg').forEach(s => {
      s.style.maxWidth = '100%';
      s.style.height = 'auto';
    });
  } catch(e) {
    container.innerHTML = '<p style="color:var(--color-text-danger);font-size:13px;padding:20px 0">Render error: ' + e.message + '</p>';
  }
}

window.showDomain = function(key) {
  document.querySelectorAll('.dtab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  render(key);
};

render('all');
</script>
